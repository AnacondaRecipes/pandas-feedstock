{% set name = "pandas" %}
{% set version = "3.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0facf7e87d38f721f0af46fe70d97373a37701b1c09f7ed7aeeb292ade5c050f

build:
  number: 0
  skip: true  # [py<311]
  script: {{ PYTHON }} -m pip install -vv --no-deps --no-build-isolation --ignore-installed .

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - pip
    - python
    - ninja-base  # [win]
    - meson-python >=0.17.1,<1
    - meson >=1.2.1,<2
    - cython <4
    - numpy {{ numpy }}
    - versioneer 0.29
    - wheel
  run:
    - python
    - numpy >=1.26.0 # [py<314]
    - numpy >=2.3.3  # [py>=314]
    - python-dateutil >=2.8.2
    - python-tzdata  # [win]
  run_constrained:
    - adbc-driver-postgresql >=1.2.0
    - adbc-driver-sqlite >=1.2.0
    - beautifulsoup4 >=4.12.3
    - blosc >=1.21.3
    - bottleneck >=1.4.2
    - fastparquet >=2024.11.0
    - fsspec >=2024.10.0
    - gcsfs >=2024.10.0
    - html5lib >=1.1
    - hypothesis >=6.116.0
    - jinja2 >=3.1.5
    - lxml >=5.3.0
    - matplotlib >=3.9.3
    - numba >=0.60.0
    - numexpr >=2.10.2
    - odfpy >=1.4.1
    - openpyxl >=3.1.5
    - psycopg2 >=2.9.10
    - pyarrow >=13.0.0
    - pyiceberg >=0.8.1
    - pymysql >=1.1.1
    - pyqt5 >=5.15.9
    - pyreadstat >=1.2.8
    - pytables >=3.10.1
    - pytest >=8.3.4
    - pytest-xdist >=3.6.1
    - python-calamine >=0.3.0
    - pytz >=2024.2
    - pyxlsb >=1.0.10
    - qtpy >=2.4.2
    - scipy >=1.14.1
    - s3fs >=2024.10.0
    - sqlalchemy >=2.0.36
    - tabulate >=0.9.0
    - xarray >=2024.10.0
    - xlrd >=2.0.1
    - xlsxwriter >=3.2.0
    - zstandard >=0.23.0

test:
  source_files:
    - pyproject.toml
  requires:
    - pip
    - pytest >=7.3.2
    - pytest-xdist >=2.2.0
    - hypothesis >=6.46.1
  commands:
    - pip check
    - export LC_ALL=en_US.UTF-8  # [osx]
    {% set config_path = "{{ SRC_DIR }}/pyproject.toml" %}
    {% set markers = ["not clipboard", "not single_cpu", "not slow", "not network", "not db"] %}
    {% set extra_args = ["-m " + " and ".join(markers)] %}
    {% set extra_args = extra_args + ["-n=2"] %}
    {% set tests_to_skip = "_not_a_real_test" %}
    # skip windows tests which call _tz_localize_using_tzinfo_api - fails on CI but not when run on dev instance
    # OSError may be thrown by tzlocal on windows at or close to 1970-01-01
    #  see https://github.com/pandas-dev/pandas/pull/37591#issuecomment-720628241
    {% set tests_to_skip = tests_to_skip + " or TestDatetime64ArrayLikeComparisons or test_apply_out_of_range or TestNonNano or test_setitem_str_impute_tz or test_run_binary[ne-False-_integer_integers]" %} # [win]
    # test_scalar_unary triggers python 3.12 DeprecationWarning: Bitwise inversion '~' on bool is deprecated.
    {% set tests_to_skip = tests_to_skip + " or test_scalar_unary" %} # [py>=312]
    # Fixed in https://github.com/pandas-dev/pandas/pull/59016, not yet backported to 2.3
    {% set tests_to_skip = tests_to_skip + " or test_array_inference[data7-expected7]" %}
    # Could be due to uninitialized memory
    {% set tests_to_skip = tests_to_skip + " or test_run_arithmetic or test_run_binary" %} # [win]
    # Skip due to incompatibility with numexpr 2.14.1. TODO: Delete with pandas new release, see https://github.com/pandas-dev/pandas/pull/62553
    {% set tests_to_skip = tests_to_skip + " or test_binop_other or test_add_list_to_masked_array_boolean or test_bool_ops_warn_on_arithmetic" %}
    # Skip tests that fail with python 3.14 due to new exception messages. Delete once fixed.
    {% set tests_to_skip = tests_to_skip + " or test_simple_cmp_ops or test_compound_invert_op or test_simple_arith_ops" %} # [py==314]
    {% set extra_args = extra_args + ["-k", "not (" + tests_to_skip + ")", "--no-strict-data-files"] %}
    # use --no-strict-data-files
    # xref: https://github.com/pandas-dev/pandas/issues/54907
    - python -c "import pandas; pandas.test(extra_args={{ extra_args }})"

about:
  home: https://pandas.pydata.org
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: High-performance, easy-to-use data structures and data analysis tools.
  description: |
    pandas is a Python package that provides fast, flexible, and expressive data structures
    designed to make working with "relational" or "labeled" data both easy and intuitive.
    It aims to be the fundamental high-level building block for doing practical, real world
    data analysis in Python. Additionally, it has the broader goal of becoming the most
    powerful and flexible open source data analysis / manipulation tool available in any
    language. It is already well on its way towards this goal.
  dev_url: https://github.com/pandas-dev/pandas
  doc_url: https://pandas.pydata.org/pandas-docs/version/{{ version }}/index.html

extra:
  skip-lints:
    - has_run_test_and_commands
  recipe-maintainers:
    - jreback
    - jorisvandenbossche
    - msarahan
    - ocefpaf
    - TomAugspurger
    - WillAyd
    - simonjayhawkins
    - ryanskeith
